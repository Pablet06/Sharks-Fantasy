name: Weekly Stats Sync

on:
  schedule:
    - cron: '0 22 * * 6'  # Every Saturday at 22:00 UTC (23:00 CET)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        run: npm install
        working-directory: scraper

      - name: Run stats sync
        # No .env file here — env vars injected below. dotenv no-ops on missing file.
        run: node --import tsx/esm src/index.ts
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Notify on failure
        if: failure()
        run: echo "::error::Scraper sync failed! Check logs above."
